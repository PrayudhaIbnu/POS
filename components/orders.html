<!-- VIEW ORDERS -->
<div id="view-orders" class="hidden space-y-5">

  <!-- Header -->
  <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">
        Manajemen Pesanan
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Kelola pesanan yang masuk dari customer
      </p>
    </div>

    <div class="flex gap-2">
      <button
        onclick="renderOrders()"
        class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-3 rounded-xl font-medium flex items-center gap-2 transition">
        <i data-lucide="refresh-cw"></i>
        Refresh
      </button>
      
      <button
        onclick="clearCompletedOrders()"
        class="bg-gray-500 hover:bg-gray-600 text-white px-5 py-3 rounded-xl font-medium flex items-center gap-2 transition">
        <i data-lucide="trash-2"></i>
        Hapus Selesai
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-xl border p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-sm text-gray-500">Total Pesanan</p>
        <i data-lucide="clipboard-list" class="text-gray-400" style="width:20px;height:20px"></i>
      </div>
      <h3 id="order-total" class="text-3xl font-bold">0</h3>
    </div>

    <div class="bg-white rounded-xl border p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-sm text-gray-500">Menunggu</p>
        <i data-lucide="clock" class="text-orange-500" style="width:20px;height:20px"></i>
      </div>
      <h3 id="order-waiting" class="text-3xl font-bold text-orange-500">0</h3>
    </div>

    <div class="bg-white rounded-xl border p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-sm text-gray-500">Diproses</p>
        <i data-lucide="chef-hat" class="text-blue-500" style="width:20px;height:20px"></i>
      </div>
      <h3 id="order-processing" class="text-3xl font-bold text-blue-500">0</h3>
    </div>

    <div class="bg-white rounded-xl border p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-sm text-gray-500">Selesai</p>
        <i data-lucide="check-circle" class="text-green-500" style="width:20px;height:20px"></i>
      </div>
      <h3 id="order-completed" class="text-3xl font-bold text-green-500">0</h3>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="bg-white rounded-xl border p-2 flex gap-2 overflow-x-auto">
    <button
      onclick="filterOrders('all')"
      id="filter-all"
      class="filter-btn px-4 py-2 rounded-lg font-medium text-sm transition bg-crimson text-white">
      Semua
    </button>
    <button
      onclick="filterOrders('Menunggu Diproses')"
      id="filter-waiting"
      class="filter-btn px-4 py-2 rounded-lg font-medium text-sm transition bg-gray-100 text-gray-600 hover:bg-gray-200">
      Menunggu
    </button>
    <button
      onclick="filterOrders('Sedang Diproses')"
      id="filter-processing"
      class="filter-btn px-4 py-2 rounded-lg font-medium text-sm transition bg-gray-100 text-gray-600 hover:bg-gray-200">
      Diproses
    </button>
    <button
      onclick="filterOrders('Selesai')"
      id="filter-completed"
      class="filter-btn px-4 py-2 rounded-lg font-medium text-sm transition bg-gray-100 text-gray-600 hover:bg-gray-200">
      Selesai
    </button>
  </div>

  <!-- Orders List -->
  <div id="orders-list" class="space-y-3">
    <!-- Orders will be rendered here -->
  </div>

</div>
