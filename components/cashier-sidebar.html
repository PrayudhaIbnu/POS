<div class="flex h-full overflow-hidden">
  <!-- Overlay Mobile -->
  <div
    id="sidebar-overlay"
    onclick="toggleLeftSidebar()"
    class="hidden fixed inset-0 bg-black/40 z-40 md:hidden">
  </div>

  <!-- Sidebar -->
  <aside
    id="main-sidebar"
    class="fixed md:relative inset-y-0 left-0 z-50 w-64 bg-crimson text-white flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300">

    <!-- Header -->
    <div
      class="p-6 border-b border-crimson-dark flex items-center justify-between">

      <div>
        <h2 id="sidebar-store-name" class="text-lg font-bold">
          Seblak Mama Ica
        </h2>
        <p class="text-sm text-red-200 mt-1">
          Cashier Panel
        </p>
      </div>

      <button
        onclick="toggleLeftSidebar()"
        class="md:hidden p-1 rounded-lg bg-crimson-dark text-red-100 hover:text-white">
        <i data-lucide="x" style="width:20px;height:20px"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2">
      <button
        id="nav-products"
        onclick="switchView('products')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-crimson-dark text-white transition">

        <i data-lucide="layout-grid" style="width:20px;height:20px"></i>

        <span class="font-medium">
          Products
        </span>
      </button>

      <button
        id="nav-reports"
        onclick="switchView('reports')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-100 hover:bg-crimson-dark transition">

        <i data-lucide="bar-chart-3" style="width:20px;height:20px"></i>

        <span class="font-medium">
          Laporan Penjualan
        </span>
      </button>

      <!-- Jika nanti ingin aktifkan tambah produk -->
      <!--
      <button
        onclick="navigateTo('add-product')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-100 hover:bg-crimson-dark transition">

        <i data-lucide="plus-circle"></i>

        <span class="font-medium">
          Tambah Produk
        </span>
      </button>
      -->
    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-crimson-dark">
      <button
        onclick="navigateTo('login')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-crimson-dark transition">

        <i data-lucide="log-out" style="width:18px;height:18px"></i>

        <span>
          Logout
        </span>
      </button>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Mobile Header -->
    <header
      class="md:hidden flex items-center gap-3 p-4 bg-white border-b border-gray-200">

      <button
        onclick="toggleLeftSidebar()"
        class="p-2 rounded-lg hover:bg-gray-100">

        <i data-lucide="menu" style="width:24px;height:24px"></i>
      </button>

      <div>
        <h3 class="font-bold text-gray-800">
          Seblak Mama Ica
        </h3>

        <p class="text-xs text-gray-500">
          Cashier Panel
        </p>
      </div>
    </header>

  </div>
</div>
