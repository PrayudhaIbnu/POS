<div class="flex h-full overflow-hidden">
  <!-- Overlay Mobile -->
  <div
    id="sidebar-overlay"
    onclick="toggleLeftSidebar()"
    class="hidden fixed inset-0 bg-black/40 z-40 md:hidden"
  ></div>

  <!-- Sidebar -->
  <aside
    id="main-sidebar"
    class="fixed md:relative inset-y-0 left-0 z-50 w-72 sm:w-64 bg-crimson text-white flex flex-col transform -translate-x-full md:translate-x-0 transition-all duration-300 shadow-xl md:shadow-none"
  >
    <!-- Header -->
    <div
      class="px-5 py-4 border-b border-white/10 flex items-center justify-between"
    >
      <div>
        <h2
          id="sidebar-store-name"
          class="text-lg font-bold"
          class="text-xl font-bold tracking-tight"
        >
          Seblak Mama Ica
        </h2>
        <p class="text-sm text-red-200 mt-1">Cashier Panel</p>
      </div>

      <button
        onclick="toggleLeftSidebar()"
        class="md:hidden p-1 rounded-lg bg-crimson-dark text-red-100 hover:text-white"
      >
        <i data-lucide="x" style="width: 20px; height: 20px"></i>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-3 space-y-1">
      <!-- Products Dropdown -->
      <div class="w-full">
        <button
          onclick="toggleDropdown('products-menu')"
          class="w-full flex items-center justify-between gap-3 px-4 py-3 rounded-lg bg-crimson-dark text-white transition"
        >
          <div class="flex items-center gap-3">
            <i data-lucide="layout-grid" style="width: 20px; height: 20px"></i>

            <span class="font-medium"> Products </span>
          </div>

          <i
            data-lucide="chevron-down"
            id="products-arrow"
            style="width: 18px; height: 18px"
          >
          </i>
        </button>

        <!-- Dropdown Content -->
        <div id="products-menu" class="hidden mt-2 ml-4 space-y-2">
          <button
            onclick="switchView('stock')"
            class="w-full flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-crimson-dark transition text-gray-100"
          >
            <i data-lucide="package" style="width: 18px; height: 18px"></i>

            <span> Stok </span>
          </button>
        </div>
      </div>

      <button
        id="nav-reports"
        onclick="switchView('reports')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-100 hover:bg-crimson-dark transition"
      >
        <i data-lucide="bar-chart-3" style="width: 20px; height: 20px"></i>

        <span class="font-medium"> Laporan Penjualan </span>
      </button>

      <!-- Jika nanti ingin aktifkan tambah produk -->
      <!--
      <button
        onclick="navigateTo('add-product')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-100 hover:bg-crimson-dark transition">

        <i data-lucide="plus-circle"></i>

        <span class="font-medium">
          Tambah Produk
        </span>
      </button>
      -->
    </nav>

    <!-- Footer -->
    <div class="p-4 border-t border-crimson-dark">
      <button
        onclick="navigateTo('login')"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-crimson-dark transition"
      >
        <i data-lucide="log-out" style="width: 18px; height: 18px"></i>

        <span> Logout </span>
      </button>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Mobile Header -->
    <header class="md:hidden sticky top-0 z-30 px-4 py-3 shadow-sm">
      <div class="flex items-center gap-3">
        <button
          onclick="toggleLeftSidebar()"
          class="p-2 rounded-xl hover:bg-gray-100 transition"
        >
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>

        <div class="flex-1 min-w-0">
          <h3 class="text-base font-semibold text-gray-900 truncate">
            Seblak Mama Ica
          </h3>

          <p class="text-xs text-gray-500">Cashier Panel</p>
        </div>
      </div>
    </header>
  </div>
</div>
