        <div class="min-w-0">

            class="text-base font-bold text-white truncate">
            Seblak Mama Ica
          </h2>
          <p class="text-xs text-white/70 mt-0.5">Cashier Panel</p>
        </div>
      </div>

      <button
        onclick="toggleLeftSidebar(true)"
        class="md:hidden w-9 h-9 rounded-lg bg-white/20 hover:bg-white/30 text-white flex items-center justify-center transition">
        <i data-lucide="x" style="width:18px;height:18px"></i>

    <nav class="flex-1 overflow-y-auto p-3 space-y-6">

          <button

            <span class="font-medium text-sm">Meja</span>

          <!-- Stock (pindah dari dropdown ke menu utama) -->
          <button
            onclick="switchView('stock')"
            id="nav-stock"
            class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-700 hover:bg-gray-100 transition group">

      </div>

      <!-- ANALITIK -->
      <div>
        <p class="px-4 mb-2 text-[11px] font-semibold text-gray-400 uppercase tracking-wider">

        <div class="space-y-1">

          <button
            onclick="switchView('reports')"

        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold text-gray-800 truncate">Kasir</p>

      <button

        <span class="font-medium text-sm">Keluar</span>
      </button>
    </div>

  <!-- MAIN AREA -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <div class="flex items-center gap-3">
        <button

        </button>

        <div class="flex items-center gap-2 flex-1 min-w-0">
          <div class="w-9 h-9 bg-gradient-to-br from-crimson to-crimson-dark rounded-lg flex items-center justify-center flex-shrink-0">
            <i data-lucide="utensils-crossed" class="text-white" style="width:18px;height:18px"></i>
          </div>
          <div class="min-w-0">
            <h3 class="text-sm font-bold text-gray-900 truncate">

            <p class="text-[11px] text-gray-500">Cashier Panel</p>

    position: relative;
  }
  
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 60%;
    background-color: #DC143C;
    border-radius: 0 4px 4px 0;
  }
  
  .nav-item.active .nav-icon {
    color: #DC143C !important;

  #main-sidebar nav::-webkit-scrollbar {
