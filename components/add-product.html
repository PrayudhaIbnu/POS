
      <div
        id="page-add-product"
        class="h-full w-full hidden flex items-center justify-center bg-gray-100">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg mx-4">
          <h2 class="text-xl font-bold text-gray-800 mb-6">Tambah Menu Baru</h2>
          <form
            onsubmit="
              event.preventDefault();
              saveProduct();
            ">
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2"
                >Product Photo</label
              >
              <div
                class="border-2 border-dashed border-gray-300 rounded-xl h-44 flex flex-col items-center justify-center cursor-pointer hover:border-crimson transition"
                onclick="document.getElementById('file-input').click()">
                <i
                  data-lucide="cloud-upload"
                  class="text-gray-400 mb-2"
                  style="width: 40px; height: 40px"></i>
                <p class="text-gray-500 text-sm font-medium">
                  Click to upload product photo
                </p>
                <p class="text-gray-400 text-xs mt-1">PNG, JPG up to 5MB</p>
              </div>
              <input
                id="file-input"
                type="file"
                accept="image/*"
                class="hidden" />
            </div>
            <div class="mb-4">
              <label
                for="prod-name"
                class="block text-sm font-medium text-gray-700 mb-1"
                >Product Name</label
              >
              <input
                id="prod-name"
                type="text"
                placeholder="e.g. Nasi Goreng Spesial"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-crimson" />
            </div>
            <div class="mb-4">
              <label
                for="prod-cat"
                class="block text-sm font-medium text-gray-700 mb-1"
                >Category</label
              >
              <select
                id="prod-cat"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-crimson">
                <option>Food</option>
                <option>Beverage</option>
                <option>Snack</option>
                <option>Dessert</option>
              </select>
            </div>
            <div class="mb-6">
              <label
                for="prod-price"
                class="block text-sm font-medium text-gray-700 mb-1"
                >Price (Rp)</label
              >
              <input
                id="prod-price"
                type="number"
                placeholder="25000"
                class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-crimson" />
            </div>
            <div class="flex gap-3">
              <button
                type="button"
                onclick="navigateTo('dashboard')"
                class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-lg transition">
                Cancel
              </button>
              <button
                type="submit"
                class="flex-1 bg-pos-green hover:bg-pos-green-hover text-white font-semibold py-3 rounded-lg transition">
                Save Product
              </button>
            </div>
          </form>
        </div>
      </div>
