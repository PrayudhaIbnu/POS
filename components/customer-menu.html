<div id="page-customer-menu" class="hidden min-h-screen bg-gray-100">
  <div class="max-w-7xl mx-auto p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold">
          Selamat Datang,
          <span id="customer-name-display"></span>
        </h1>
        <p class="text-gray-500">Pilih menu favoritmu</p>
      </div>

      <button
        onclick="navigateTo('login')"
        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg">
        Keluar
      </button>
    </div>

    <!-- Content -->
    <div class="grid lg:grid-cols-3 gap-6">
      <!-- Produk -->
      <div class="lg:col-span-2">
        <div
          id="customer-product-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>

      <!-- Keranjang -->
      <div class="bg-white rounded-xl shadow p-4 sticky top-4">
        <h3 class="font-bold mb-4">Pesanan Saya</h3>

        <div
          id="customer-cart-list"
          class="space-y-3 max-h-[500px] overflow-auto"></div>

        <div class="border-t mt-4 pt-4">
          <div class="flex justify-between font-semibold">
            <span>Total</span>
            <span id="customer-cart-total"> Rp 0 </span>
          </div>

          <button
            onclick="openCustomerCheckout()"
            class="mt-4 w-full bg-pos-green text-white py-3 rounded-lg">
            Checkout
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
