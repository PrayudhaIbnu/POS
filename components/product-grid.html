<!-- VIEW PRODUCTS -->
<div id="view-products" class="space-y-5">
  <!-- Header -->
  <div
    class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
    <div>
      <h2 class="text-2xl font-bold text-gray-800">Menu Items</h2>

      <p class="text-sm text-gray-500 mt-1">
        Kelola pesanan dan pilih menu untuk pelanggan
      </p>
    </div>

    <div class="flex items-center gap-3">
      <!-- Refresh -->
      <button
        onclick="refreshProducts()"
        class="flex items-center gap-2 bg-white border border-gray-200 px-4 py-3 rounded-xl shadow-sm hover:bg-gray-50 transition">
        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        <span class="font-medium">Refresh</span>
      </button>

      <!-- Cart -->
      <button
        onclick="toggleMobileCart()"
        class="hidden lg:flex items-center gap-2 bg-white border border-gray-200 px-4 py-3 rounded-xl shadow-sm hover:bg-gray-50 transition">
        <i data-lucide="shopping-cart" class="w-5 h-5"></i>

        <span class="font-medium">Pesanan</span>

        <span
          id="desktop-cart-badge"
          class="bg-crimson text-white text-xs font-bold px-2 py-0.5 rounded-full">
          0
        </span>
      </button>
    </div>
  </div>

  <!-- Search -->
  <div class="relative">
    <i
      data-lucide="search"
      class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5">
    </i>

    <input
      id="search-input"
      type="text"
      oninput="filterProducts()"
      placeholder="Cari menu..."
      class="w-full h-12 pl-11 pr-4 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-crimson" />
  </div>

  <!-- Category Filter -->
  <div id="category-filters" class="flex gap-2 overflow-x-auto pb-1">
    <button
      onclick="setCategoryFilter('All')"
      class="cat-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium bg-crimson text-white">
      Semua
    </button>

    <button
      onclick="setCategoryFilter('Food')"
      class="cat-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50">
      Makanan
    </button>

    <button
      onclick="setCategoryFilter('Beverage')"
      class="cat-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50">
      Minuman
    </button>

    <button
      onclick="setCategoryFilter('Snack')"
      class="cat-filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50">
      Snack
    </button>
  </div>

  <!-- Product Grid -->
  <div
    id="product-grid"
    class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"></div>
</div>

<script>
  const desktopBadge = document.getElementById("desktop-cart-badge");

  if (desktopBadge) {
    const totalQty = cashierCart.reduce((sum, item) => sum + item.qty, 0);

    desktopBadge.textContent = totalQty;
  }
</script>
