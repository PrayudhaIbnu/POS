
      <div
        id="payment-modal"
        class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 sm:p-8">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-gray-800">Payment</h2>
            <button
              onclick="closePayment()"
              class="text-gray-400 hover:text-gray-600">
              <i data-lucide="x" style="width: 24px; height: 24px"></i>
            </button>
          </div>
          <div class="grid grid-cols-3 gap-3 mb-6">
            <button
              id="pay-cash"
              onclick="selectPayment(this, 'Cash')"
              class="payment-method border-2 border-crimson bg-red-50 rounded-xl py-4 flex flex-col items-center gap-2 transition">
              <i
                data-lucide="banknote"
                class="text-crimson"
                style="width: 24px; height: 24px"></i>
              <span class="text-sm font-medium text-crimson">Cash</span>
            </button>
            <button
              onclick="selectPayment(this, 'QRIS')"
              class="payment-method border-2 border-gray-200 rounded-xl py-4 flex flex-col items-center gap-2 hover:border-crimson transition">
              <i
                data-lucide="qr-code"
                class="text-gray-500"
                style="width: 24px; height: 24px"></i>
              <span class="text-sm font-medium text-gray-600">QRIS</span>
            </button>
            <button
              onclick="selectPayment(this, 'Card')"
              class="payment-method border-2 border-gray-200 rounded-xl py-4 flex flex-col items-center gap-2 hover:border-crimson transition">
              <i
                data-lucide="credit-card"
                class="text-gray-500"
                style="width: 24px; height: 24px"></i>
              <span class="text-sm font-medium text-gray-600">Card</span>
            </button>
          </div>
          <div class="bg-gray-50 rounded-xl p-4 mb-5">
            <p class="text-sm text-gray-500">Total Amount</p>
            <p id="payment-total" class="text-2xl font-bold text-gray-800">
              Rp 0
            </p>
          </div>
          <div class="mb-6">
            <label
              for="tendered"
              class="block text-sm font-medium text-gray-700 mb-1"
              >Amount Tendered</label
            >
            <input
              id="tendered"
              type="number"
              placeholder="50000"
              class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-crimson" />
          </div>
          <button
            onclick="confirmPayment()"
            class="w-full bg-pos-green hover:bg-pos-green-hover text-white font-bold py-4 rounded-lg transition text-lg">
            Confirm Payment
          </button>
        </div>
      </div>
