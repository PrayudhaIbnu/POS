<!-- Back-drop Overlay untuk Mobile Cart Drawer -->
<div
  id="cart-overlay"
  onclick="toggleMobileCart()"
  class="hidden fixed inset-0 bg-black/40 z-30"></div>

<!-- Right Checkout Sidebar (Responsive Drawer) -->
<aside
  id="checkout-sidebar"
  class="fixed inset-y-0 right-0 z-40 w-80 bg-white border-l border-gray-200 flex flex-col shrink-0 transform translate-x-full transition-transform duration-300">
  <div class="p-5 border-b border-gray-200 flex items-center justify-between">
    <h3 class="font-bold text-gray-800 text-lg">Current Order</h3>

    <button
      onclick="toggleMobileCart()"
      class="text-gray-400 hover:text-gray-600 p-1 rounded-lg bg-gray-100">
      <i data-lucide="x" style="width: 20px; height: 20px"></i>
    </button>
  </div>

  <div id="order-list" class="flex-1 overflow-auto p-4 space-y-3">
    <p id="empty-cart" class="text-center text-gray-400 mt-10">No items yet</p>
  </div>

  <div class="p-5 border-t border-gray-200 space-y-3 bg-white">
    <div class="flex justify-between text-gray-600">
      <span>Subtotal</span>
      <span id="subtotal">Rp 0</span>
    </div>

    <div class="flex justify-between font-bold text-lg text-gray-800">
      <span>Total</span>
      <span id="total">Rp 0</span>
    </div>

    <button
      onclick="openPayment()"
      class="w-full bg-pos-green hover:bg-pos-green-hover text-white font-semibold py-4 rounded-lg transition">
      Proceed to Payment
    </button>
  </div>
</aside>

<!-- Floating Cart Action Button (Hanya Muncul Di Mobile/Tablet) -->
<button
  id="mobile-cart-trigger"
  onclick="toggleMobileCart()"
  class="fixed bottom-6 right-6 z-30 lg:hidden bg-crimson hover:bg-crimson-dark text-white p-4 rounded-full shadow-2xl flex items-center justify-center gap-2 transition active:scale-95">
  <div class="relative">
    <i data-lucide="shopping-cart" style="width: 24px; height: 24px"></i>
    <span
      id="mobile-cart-badge"
      class="absolute -top-3 -right-3 bg-pos-green text-white text-[11px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden"
      >0</span
    >
  </div>
  <span class="font-semibold text-sm pr-1">Keranjang</span>
</button>
