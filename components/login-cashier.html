<div
  id="page-login-cashier"
  class="min-h-screen bg-gradient-to-br from-red-50 via-white to-red-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">
    <div class="text-center mb-8">
      <div
        class="w-20 h-20 rounded-2xl bg-red-100 flex items-center justify-center mx-auto mb-4">
        <i data-lucide="shield-check" class="text-crimson w-10 h-10"></i>
      </div>

      <h2 class="text-3xl font-bold text-gray-800">Login Kasir</h2>

      <p class="text-gray-500 mt-2">Masuk ke dashboard kasir</p>
    </div>

    <form
      onsubmit="
        event.preventDefault();
        loginCashier();
      "
      class="space-y-4">
      <input
        id="cashier-username"
        type="text"
        placeholder="Username"
        class="w-full border rounded-xl px-4 py-3" />

      <input
        id="cashier-password"
        type="password"
        placeholder="Password"
        class="w-full border rounded-xl px-4 py-3" />

      <button
        type="submit"
        class="w-full bg-crimson text-white py-3 rounded-xl">
        Login
      </button>
    </form>

    <button
      onclick="navigateTo('customer-login')"
      class="w-full border border-gray-300 hover:bg-gray-50 py-3 mt-3 rounded-xl font-semibold text-gray-700 transition flex items-center justify-center gap-2">
      <i data-lucide="user-round"></i>
      Pesan Sebagai Customer
    </button>
  </div>
</div>
