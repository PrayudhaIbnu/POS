<!-- VIEW DASHBOARD -->
<div id="view-dashboard" class="hidden space-y-6">

  <!-- HEADER: Jam, Tanggal & Greeting -->
  <div class="bg-gradient-to-r from-crimson to-crimson-dark rounded-2xl p-6 text-white shadow-lg">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <i data-lucide="clock" class="w-5 h-5"></i>
          <span id="dashboard-greeting" class="text-sm font-medium text-white/80">
            Selamat Pagi
          </span>
        </div>
        <h2 class="text-3xl lg:text-4xl font-bold tracking-tight">
          Dashboard Kasir
        </h2>
        <p class="text-white/80 mt-1 text-sm">
          Ringkasan aktivitas toko hari ini
        </p>
      </div>

      <div class="flex items-center gap-4 bg-white/10 backdrop-blur-sm rounded-xl p-4">
        <div class="text-right">
          <div id="dashboard-time" class="text-4xl font-bold font-mono tracking-wider">
            00:00:00
          </div>
          <div id="dashboard-date" class="text-sm text-white/80 mt-1">
            -
          </div>
        </div>
        <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
          <i data-lucide="calendar" class="w-6 h-6"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS CARDS -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- Pendapatan Hari Ini -->
    <div class="bg-white rounded-xl border p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-3">
        <div class="w-11 h-11 bg-green-100 rounded-xl flex items-center justify-center">
          <i data-lucide="banknote" class="text-green-600" style="width:22px;height:22px"></i>
        </div>
        <span class="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-full">
          Hari Ini
        </span>
      </div>
      <p class="text-sm text-gray-500 mb-1">Pendapatan</p>
      <h3 id="stat-revenue" class="text-2xl font-bold text-gray-800">Rp 0</h3>
      <p id="stat-revenue-count" class="text-xs text-gray-400 mt-2">0 transaksi</p>
    </div>

    <!-- Total Transaksi -->
    <div class="bg-white rounded-xl border p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-3">
        <div class="w-11 h-11 bg-blue-100 rounded-xl flex items-center justify-center">
          <i data-lucide="receipt" class="text-blue-600" style="width:22px;height:22px"></i>
        </div>
        <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-full">
          Total
        </span>
      </div>
      <p class="text-sm text-gray-500 mb-1">Transaksi</p>
      <h3 id="stat-transactions" class="text-2xl font-bold text-gray-800">0</h3>
      <p id="stat-avg-transaction" class="text-xs text-gray-400 mt-2">Rata-rata Rp 0</p>
    </div>

    <!-- Pesanan Menunggu -->
    <div class="bg-white rounded-xl border p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-3">
        <div class="w-11 h-11 bg-orange-100 rounded-xl flex items-center justify-center">
          <i data-lucide="clock" class="text-orange-600" style="width:22px;height:22px"></i>
        </div>
        <span id="stat-orders-badge" class="text-xs font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded-full hidden">
          0
        </span>
      </div>
      <p class="text-sm text-gray-500 mb-1">Pesanan Menunggu</p>
      <h3 id="stat-pending-orders" class="text-2xl font-bold text-orange-600">0</h3>
      <p class="text-xs text-gray-400 mt-2">Perlu diproses</p>
    </div>

    <!-- Stok Menipis -->
    <div class="bg-white rounded-xl border p-5 hover:shadow-md transition">
      <div class="flex items-center justify-between mb-3">
        <div class="w-11 h-11 bg-red-100 rounded-xl flex items-center justify-center">
          <i data-lucide="alert-triangle" class="text-red-600" style="width:22px;height:22px"></i>
        </div>
        <span id="stat-stock-badge" class="text-xs font-semibold text-red-600 bg-red-50 px-2 py-1 rounded-full hidden">
          0
        </span>
      </div>
      <p class="text-sm text-gray-500 mb-1">Stok Menipis</p>
      <h3 id="stat-low-stock" class="text-2xl font-bold text-red-600">0</h3>
      <p class="text-xs text-gray-400 mt-2">Produk ≤ 10 item</p>
    </div>
  </div>

  <!-- CONTENT GRID -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- Pesanan Aktif (2/3 lebar) -->
    <div class="lg:col-span-2 bg-white rounded-xl border shadow-sm">
      <div class="p-5 border-b flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i data-lucide="chef-hat" class="text-crimson" style="width:20px;height:20px"></i>
          <h3 class="font-bold text-gray-800">Pesanan Aktif</h3>
        </div>
        <button
          onclick="switchView('orders')"
          class="text-sm text-crimson hover:text-crimson-dark font-medium flex items-center gap-1">
          Lihat Semua
          <i data-lucide="arrow-right" style="width:14px;height:14px"></i>
        </button>
      </div>

      <div id="dashboard-active-orders" class="p-4 space-y-2 max-h-[400px] overflow-y-auto">
        <!-- Akan di-render oleh JS -->
      </div>
    </div>

    <!-- Transaksi Terakhir (1/3 lebar) -->
    <div class="bg-white rounded-xl border shadow-sm">
      <div class="p-5 border-b flex items-center gap-2">
        <i data-lucide="history" class="text-crimson" style="width:20px;height:20px"></i>
        <h3 class="font-bold text-gray-800">Transaksi Terakhir</h3>
      </div>

      <div id="dashboard-latest-transactions" class="p-4 space-y-2 max-h-[400px] overflow-y-auto">
        <!-- Akan di-render oleh JS -->
      </div>
    </div>

  </div>

  <!-- Produk Terlaris Hari Ini -->
  <div class="bg-white rounded-xl border shadow-sm">
    <div class="p-5 border-b flex items-center gap-2">
      <i data-lucide="flame" class="text-orange-500" style="width:20px;height:20px"></i>
      <h3 class="font-bold text-gray-800">Produk Terlaris Hari Ini</h3>
    </div>

    <div id="dashboard-top-products" class="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
      <!-- Akan di-render oleh JS -->
    </div>
  </div>

</div>
