<!doctype html>
<html lang="en" class="h-full">
  <head>
    <script src="/_sdk/telemetry_sdk.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>POS Cashier System</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <!-- Lucide -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <!-- SDK -->
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <!-- App -->
    <script src="js/components.js"></script>

    <script src="js/state.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/customer.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/config.js"></script>

    <script src="script.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              crimson: "#DC143C",
              "crimson-dark": "#A91030",
              "pos-green": "#22C55E",
              "pos-green-hover": "#16A34A",
            },
          },
        },
      };
    </script>

    <style>
      * {
        font-family: "DM Sans", sans-serif;
        box-sizing: border-box;
      }
    </style>
  </head>

  <body class="h-full bg-gray-100 overflow-auto">
    <div id="app" class="h-full w-full">
      <!-- LOGIN -->
      <div id="login-component"></div>

      <!-- CUSTOMER -->
      <div id="customer-menu-component"></div>

      <!-- DASHBOARD -->
      <div id="page-dashboard" class="hidden h-full w-full">
        <div class="flex h-full relative overflow-hidden">
          <!-- SIDEBAR -->
          <div id="sidebar-component"></div>

          <!-- MAIN CONTENT -->
          <main class="flex-1 overflow-auto p-4 sm:p-6 pb-24 lg:pb-6">
            <!-- PRODUCTS -->
            <div id="product-grid-component"></div>

            <!-- REPORTS -->
            <div id="reports-component"></div>
          </main>

          <!-- CART -->
          <div id="customer-cart-component"></div>
        </div>
      </div>

      <!-- ADD PRODUCT -->
      <div id="add-product-component"></div>

      <!-- MODALS -->
      <div id="product-detail-modal-component"></div>
      <div id="payment-modal-component"></div>
      <div id="receipt-modal-component"></div>
    </div>
  </body>
</html>
