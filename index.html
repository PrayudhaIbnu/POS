<!doctype html>
<html lang="en" class="h-full">
  <head>
    <script src="/_sdk/telemetry_sdk.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>POS Cashier System</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <!-- Lucide -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <!-- SDK -->
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <!-- App -->
    <script src="js/components.js"></script>

    <script src="js/state.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/customer.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/config.js"></script>
    <script src="js/stock.js"></script>

    <script src="script.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              crimson: "#DC143C",
              "crimson-dark": "#A91030",
              "pos-green": "#22C55E",
              "pos-green-hover": "#16A34A",
            },
          },
        },
      };
    </script>

    <style>
      * {
        font-family: "DM Sans", sans-serif;
        box-sizing: border-box;
      }
    </style>
  </head>

  <body class="h-full bg-gray-100 overflow-auto">
    <div id="app" class="h-full w-full">
      <!-- LOGIN -->
      <div id="login-component"></div>

      <!-- CUSTOMER -->
      <div id="customer-menu-component"></div>

      <!-- DASHBOARD -->
      <div id="page-dashboard" class="hidden h-screen w-full">
        <div class="flex h-full relative">
          <!-- Sidebar -->
          <div
            id="sidebar-component"
            class="fixed lg:relative z-50 lg:z-auto"></div>

          <!-- Content Area -->
          <div class="flex-1 flex flex-col min-w-0">
            <!-- Main Content -->
            <main class="flex-1 overflow-auto p-3 sm:p-4 pt-20 lg:pt-6">
              <!-- Breadcrumb -->
              <nav class="flex mb-5" aria-label="Breadcrumb">
                <ol id="breadcrumb" class="inline-flex items-center space-x-2">
                  <li class="flex items-center">
                    <button
                      onclick="switchView('products')"
                      class="flex items-center text-sm font-medium text-gray-500 hover:text-crimson">
                      <i data-lucide="home" class="w-4 h-4 mr-2"></i>
                      Home
                    </button>
                  </li>
                </ol>
              </nav>

              <div id="product-grid-component"></div>

              <div id="reports-component"></div>

              <div id="stock-component"></div>
            </main>

            <!-- Sticky Footer -->
            <div
              id="footer-component"
              class="sticky bottom-0 z-20 bg-white border-t border-gray-200"></div>
          </div>

          <!-- Cart -->
          <div id="customer-cart-component"></div>
          <div id="stock-modal-component"></div>
        </div>
      </div>

      <!-- ADD PRODUCT -->
      <div id="add-product-component"></div>

      <!-- MODALS -->
      <div id="product-detail-modal-component"></div>
      <div id="payment-modal-component"></div>
      <div id="receipt-modal-component"></div>
    </div>
  </body>
</html>
